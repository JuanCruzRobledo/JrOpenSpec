repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff-format
        name: ruff format
      - id: ruff
        name: ruff check
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        name: mypy
        additional_dependencies:
          - sqlalchemy[mypy]>=2.0
          - pydantic>=2.0
          - pydantic-settings>=2.0
        args: [--config-file=pyproject.toml]
