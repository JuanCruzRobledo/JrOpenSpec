services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: integrador-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buensabor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buensabor_dev_2024}
      POSTGRES_DB: ${POSTGRES_DB:-buensabor}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - buen-sabor-net

  redis:
    image: redis:7-alpine
    container_name: integrador-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - buen-sabor-net

  api:
    build:
      context: .
      dockerfile: rest_api/Dockerfile
    container_name: integrador-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./shared:/app/shared
      - ./rest_api:/app/rest_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - buen-sabor-net

  gateway:
    build:
      context: .
      dockerfile: ws_gateway/Dockerfile
    container_name: integrador-gateway
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./shared:/app/shared
      - ./ws_gateway:/app/ws_gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - buen-sabor-net

volumes:
  pgdata:
  redisdata:

networks:
  buen-sabor-net:
    driver: bridge
